<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>xemu Diagnostic Frame Viewer</title>
<style>
:root {
  --bg: #1e1e2e; --bg2: #181825; --bg3: #313244;
  --fg: #cdd6f4; --fg2: #a6adc8; --accent: #89b4fa;
  --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
  --orange: #fab387; --surface: #45475a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas','Menlo',monospace; font-size: 13px; background: var(--bg); color: var(--fg); height: 100vh; overflow: hidden; }

#top-bar { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--bg3); flex-wrap: wrap; }
#top-bar h1 { font-size: 14px; color: var(--accent); white-space: nowrap; }
#top-bar .info { color: var(--fg2); font-size: 12px; flex: 1; }
button { background: var(--bg3); color: var(--fg); border: 1px solid var(--surface); border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 12px; }
button:hover { background: var(--surface); }
button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
button.primary:hover { opacity: 0.85; }

#main { display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 40px); }

#sidebar { background: var(--bg2); border-right: 1px solid var(--bg3); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-section { padding: 6px 8px; border-bottom: 1px solid var(--bg3); }
.sidebar-section h2 { font-size: 11px; text-transform: uppercase; color: var(--fg2); margin-bottom: 4px; letter-spacing: 0.5px; }
#frame-list, #draw-list { overflow-y: auto; flex: 1; }
#frame-list { max-height: 120px; }
.list-item { padding: 4px 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.list-item:hover { background: var(--bg3); }
.list-item.selected { background: var(--accent); color: var(--bg); }
.list-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.changed { background: var(--orange); }
.dot.unchanged { background: transparent; }
.list-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-item .count { color: var(--fg2); font-size: 11px; }
.list-item.selected .count { color: var(--bg); opacity: 0.7; }
.list-item .thumb { width: 40px; height: 30px; object-fit: contain; border-radius: 3px; background: var(--bg); flex-shrink: 0; }

#filter-box { width: 100%; background: var(--bg); color: var(--fg); border: 1px solid var(--bg3); border-radius: 3px; padding: 3px 6px; font-family: inherit; font-size: 12px; margin-top: 4px; }

#detail { overflow-y: auto; padding: 16px; }
#detail.empty { display: flex; align-items: center; justify-content: center; color: var(--fg2); }

.state-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-bottom: 16px; }
.state-card { background: var(--bg2); border: 1px solid var(--bg3); border-radius: 6px; padding: 10px; }
.state-card h3 { font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; letter-spacing: 0.5px; }
.state-card .row { display: flex; justify-content: space-between; padding: 2px 0; }
.state-card .key { color: var(--fg2); }
.state-card .val { color: var(--fg); }
.state-card .val.on { color: var(--green); }
.state-card .val.off { color: var(--red); }

.surface-images { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.surface-img-box { background: var(--bg2); border: 1px solid var(--bg3); border-radius: 6px; padding: 8px; text-align: center; }
.surface-img-box h3 { font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.surface-img-box canvas { max-width: 480px; max-height: 360px; border: 1px solid var(--bg3); border-radius: 4px; image-rendering: pixelated; background: #000; }
.surface-img-box .no-img { color: var(--fg2); font-size: 12px; padding: 40px; }

.shader-section { margin-bottom: 16px; }
.shader-section h3 { font-size: 12px; color: var(--accent); margin-bottom: 6px; cursor: pointer; user-select: none; }
.shader-section h3:hover { text-decoration: underline; }
.shader-source { background: var(--bg2); border: 1px solid var(--bg3); border-radius: 6px; padding: 10px; overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre; font-size: 12px; line-height: 1.5; color: var(--fg2); }

.draw-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.draw-header h2 { font-size: 16px; color: var(--fg); }
.draw-header .tag { background: var(--bg3); padding: 2px 8px; border-radius: 3px; font-size: 11px; color: var(--fg2); }
.draw-header .tag.prim { color: var(--green); }

.diff-banner { background: var(--orange); color: var(--bg); padding: 6px 10px; border-radius: 4px; margin-bottom: 12px; font-size: 12px; }

#drop-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); }
#drop-overlay.visible { display: flex; }
</style>
</head>
<body>

<div id="top-bar">
  <h1>xemu Diag Viewer</h1>
  <span id="session-info" class="info">No session loaded</span>
  <button onclick="openFolder()">Open Session Folder</button>
  <button class="primary" id="btn-copy" onclick="copyForClaude()" style="display:none">Copy for Claude</button>
  <button id="btn-copy-diffs" onclick="copyAllDiffs()" style="display:none">Copy All Diffs</button>
</div>

<div id="main">
  <div id="sidebar">
    <div class="sidebar-section">
      <h2>Frames</h2>
      <div id="frame-list"></div>
    </div>
    <div class="sidebar-section">
      <h2>Draw Calls <span id="draw-count"></span></h2>
      <input type="text" id="filter-box" placeholder="Filter (shader, prim, blend...)" oninput="filterDraws()">
    </div>
    <div id="draw-list"></div>
  </div>
  <div id="detail" class="empty">Load a diag_session.json to begin</div>
</div>

<div id="drop-overlay">Drop files here (JSON + PPM)</div>

<input type="file" id="folder-input" webkitdirectory style="display:none" onchange="loadFolder(event)">

<script>
let session = null;
let selectedFrame = 0;
let selectedDraw = -1;
let ppmImages = {};       // filename -> dataURL (decoded cache)
let ppmFiles = {};        // filename -> File (raw, for lazy loading)
let ppmLoading = {};      // filename -> true (in-flight)
let changedDrawsSet = new Set();

function openFolder() { document.getElementById('folder-input').click(); }

function loadFolder(e) {
  const files = Array.from(e.target.files);
  // Load JSON first
  const jsonFile = files.find(f => f.name.endsWith('.json'));
  if (jsonFile) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        session = JSON.parse(ev.target.result);
        onSessionLoaded();
      } catch (err) { alert('Failed to parse JSON: ' + err.message); }
    };
    reader.readAsText(jsonFile);
  }
  // Index PPM files for lazy loading (don't parse yet)
  let ppmCount = 0;
  for (const file of files) {
    if (file.name.endsWith('.ppm')) {
      ppmFiles[file.name] = file;
      ppmCount++;
    }
  }
  console.log(`Indexed ${ppmCount} PPM files for lazy loading`);
}

function onSessionLoaded() {
  const info = session.capture_info;
  document.getElementById('session-info').textContent =
    `${info.frame_count} frame(s), starting at #${info.start_frame} | ${info.timestamp}`;
  document.getElementById('btn-copy').style.display = '';
  document.getElementById('btn-copy-diffs').style.display =
    (session.frame_diffs && session.frame_diffs.length > 0) ? '' : 'none';
  selectedFrame = 0;
  selectedDraw = -1;
  renderFrameList();
  selectFrame(0);
}

function renderFrameList() {
  const el = document.getElementById('frame-list');
  el.innerHTML = '';
  if (!session) return;
  session.frames.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'list-item' + (i === selectedFrame ? ' selected' : '');
    div.innerHTML = `<span class="label">Frame ${i} (#${f.frame_number})</span><span class="count">${f.draw_count} draws</span>`;
    div.onclick = () => selectFrame(i);
    el.appendChild(div);
  });
}

function selectFrame(idx) {
  selectedFrame = idx;
  selectedDraw = -1;
  changedDrawsSet.clear();
  if (session.frame_diffs) {
    for (const d of session.frame_diffs) {
      if (d.to_frame === idx) {
        for (const di of d.draws_with_state_changes) changedDrawsSet.add(di);
      }
    }
  }
  renderFrameList();
  renderDrawList();
  renderFrameDetail();
}

function renderFrameDetail() {
  const el = document.getElementById('detail');
  if (!session || !session.frames[selectedFrame]) {
    el.className = 'empty';
    el.innerHTML = 'Select a frame';
    return;
  }
  const f = session.frames[selectedFrame];
  el.className = '';
  let html = `<div class="draw-header"><h2>Frame ${selectedFrame} (#${f.frame_number})</h2>`;
  html += `<span class="tag">${f.draw_count} draws</span></div>`;

  // Show display PPM if available
  const displayPpm = `frame_${selectedFrame}_display.ppm`;
  const displayVramPpm = `frame_${selectedFrame}_display_vram.ppm`;
  const finalColorPpm = `frame_${selectedFrame}_final_color.ppm`;

  html += `<div class="surface-images">`;
  html += renderLazySurface(displayPpm, 'Display Surface (VRAM)');
  html += renderLazySurface(displayVramPpm, 'Display VRAM');
  html += renderLazySurface(finalColorPpm, 'Final Color (GPU)');
  html += `</div>`;

  html += `<p style="color:var(--fg2);margin-top:12px">Select a draw call from the list for detailed state.</p>`;
  el.innerHTML = html;
}

function renderLazySurface(filename, label) {
  if (ppmImages[filename]) {
    return `<div class="surface-img-box"><h3>${label}</h3><img src="${ppmImages[filename]}" style="max-width:480px;max-height:360px;image-rendering:pixelated;border-radius:4px;"></div>`;
  }
  if (ppmFiles[filename] && !ppmLoading[filename]) {
    ppmLoading[filename] = true;
    parsePpmFile(ppmFiles[filename]);
    return `<div class="surface-img-box"><h3>${label}</h3><div class="no-img">Loading ${filename}...</div></div>`;
  }
  if (ppmLoading[filename]) {
    return `<div class="surface-img-box"><h3>${label}</h3><div class="no-img">Loading...</div></div>`;
  }
  return '';
}

function renderDrawList() {
  const el = document.getElementById('draw-list');
  el.innerHTML = '';
  if (!session || !session.frames[selectedFrame]) return;
  const draws = session.frames[selectedFrame].draw_calls;
  const filter = document.getElementById('filter-box').value.toLowerCase();
  document.getElementById('draw-count').textContent = `(${draws.length})`;
  draws.forEach((d, i) => {
    if (filter) {
      // Build a searchable string from all key draw properties
      const cs = d.color_surface;
      const zs = d.zeta_surface;
      const parts = [
        `#${d.draw_index}`, d.primitive_mode || '', d.type || '', `[${d.count || ''}]`,
        d.shader_hash || '',
        d.blend ? `blend:${d.blend.enabled ? d.blend.src+'+'+d.blend.dst : 'off'}` : '',
        cs ? `surface:${cs.width}x${cs.height}` : 'surface:none',
        cs ? `color:${cs.width}x${cs.height}` : '',
        zs ? `zeta:${zs.width}x${zs.height}` : '',
        ...(d.textures || []).map(t => t.enabled ? `tex${t.stage}:${t.width}x${t.height}` : ''),
        ...(d.textures || []).map(t => t.addru || ''),
      ];
      const searchText = parts.join(' ').toLowerCase();
      if (!searchText.includes(filter)) return;
    }
    const changed = changedDrawsSet.has(d.draw_index);
    const div = document.createElement('div');
    div.className = 'list-item' + (i === selectedDraw ? ' selected' : '');

    const cs = d.color_surface;
    const surfTag = cs ? `${cs.width}x${cs.height}` : '';
    div.innerHTML = `<span class="dot ${changed ? 'changed' : 'unchanged'}"></span>` +
      `<span class="label">#${d.draw_index} ${d.primitive_mode || d.type || ''}</span>` +
      (surfTag && surfTag !== '640x480' ? `<span class="count" style="color:var(--yellow)">${surfTag}</span>` : '') +
      `<span class="count">[${d.count}]</span>`;
    div.onclick = () => selectDraw(i);
    el.appendChild(div);
  });
}

function filterDraws() { renderDrawList(); }
function selectDraw(idx) { selectedDraw = idx; renderDrawList(); renderDetail(); }

function boolSpan(v) {
  return `<span class="val ${v ? 'on' : 'off'}">${v}</span>`;
}

function renderSurfaceCanvas(filename, label) {
  if (!filename) return `<div class="surface-img-box"><h3>${label}</h3><div class="no-img">No image</div></div>`;
  if (ppmImages[filename]) {
    return `<div class="surface-img-box"><h3>${label}</h3><img src="${ppmImages[filename]}" style="max-width:480px;max-height:360px;image-rendering:pixelated;border-radius:4px;"></div>`;
  }
  // Trigger lazy load if we have the file
  if (ppmFiles[filename] && !ppmLoading[filename]) {
    ppmLoading[filename] = true;
    parsePpmFile(ppmFiles[filename]);
    return `<div class="surface-img-box"><h3>${label}</h3><div class="no-img">Loading ${filename}...</div></div>`;
  }
  if (ppmLoading[filename]) {
    return `<div class="surface-img-box"><h3>${label}</h3><div class="no-img">Loading...</div></div>`;
  }
  return `<div class="surface-img-box"><h3>${label}</h3><div class="no-img">${filename} (not in folder)</div></div>`;
}

function renderDetail() {
  const el = document.getElementById('detail');
  el.className = '';
  if (!session || selectedDraw < 0) { el.className = 'empty'; el.innerHTML = 'Select a draw call'; return; }
  const d = session.frames[selectedFrame].draw_calls[selectedDraw];
  if (!d) return;

  const changed = changedDrawsSet.has(d.draw_index);
  let html = '';

  // Header
  html += `<div class="draw-header">`;
  html += `<h2>Draw #${d.draw_index}</h2>`;
  if (d.primitive_mode) html += `<span class="tag prim">${d.primitive_mode}</span>`;
  html += `<span class="tag">${d.type}</span>`;
  if (d.count != null) html += `<span class="tag">${d.count} vertices</span>`;
  if (d.shader_hash) html += `<span class="tag">Shader: ${d.shader_hash}</span>`;
  html += `</div>`;

  if (changed) {
    html += `<div class="diff-banner">State changed from previous frame at this draw index</div>`;
  }

  // Surface images
  html += `<div class="surface-images">`;
  html += renderSurfaceCanvas(d.color_image, 'Color Surface');
  html += renderSurfaceCanvas(d.depth_image, 'Depth Surface');
  html += `</div>`;

  // State cards
  html += `<div class="state-grid">`;

  const b = d.blend || {};
  html += `<div class="state-card"><h3>Blend</h3>`;
  html += `<div class="row"><span class="key">Enabled</span>${boolSpan(b.enabled)}</div>`;
  if (b.enabled) {
    html += `<div class="row"><span class="key">Src</span><span class="val">${b.src}</span></div>`;
    html += `<div class="row"><span class="key">Dst</span><span class="val">${b.dst}</span></div>`;
    html += `<div class="row"><span class="key">Eq</span><span class="val">${b.eq}</span></div>`;
  }
  html += `</div>`;

  const dp = d.depth || {};
  html += `<div class="state-card"><h3>Depth</h3>`;
  html += `<div class="row"><span class="key">Test</span>${boolSpan(dp.test)}</div>`;
  html += `<div class="row"><span class="key">Write</span>${boolSpan(dp.write)}</div>`;
  html += `<div class="row"><span class="key">Func</span><span class="val">${dp.func}</span></div>`;
  html += `</div>`;

  const st = d.stencil || {};
  html += `<div class="state-card"><h3>Stencil</h3>`;
  html += `<div class="row"><span class="key">Test</span>${boolSpan(st.test)}</div>`;
  if (st.test) {
    html += `<div class="row"><span class="key">Func</span><span class="val">${st.func}</span></div>`;
    html += `<div class="row"><span class="key">Ref</span><span class="val">${st.ref}</span></div>`;
    html += `<div class="row"><span class="key">Mask R/W</span><span class="val">${st.mask_read}/${st.mask_write}</span></div>`;
    html += `<div class="row"><span class="key">Ops</span><span class="val">${st.op_fail}/${st.op_zfail}/${st.op_zpass}</span></div>`;
  }
  html += `</div>`;

  const cu = d.cull || {};
  html += `<div class="state-card"><h3>Cull</h3>`;
  html += `<div class="row"><span class="key">Enabled</span>${boolSpan(cu.enabled)}</div>`;
  html += `<div class="row"><span class="key">Face</span><span class="val">${cu.face}</span></div>`;
  html += `<div class="row"><span class="key">Front CCW</span>${boolSpan(cu.front_ccw)}</div>`;
  html += `</div>`;

  const cm = d.color_write_mask || {};
  html += `<div class="state-card"><h3>Color Mask</h3>`;
  html += `<div class="row"><span class="key">R</span>${boolSpan(cm.r)}</div>`;
  html += `<div class="row"><span class="key">G</span>${boolSpan(cm.g)}</div>`;
  html += `<div class="row"><span class="key">B</span>${boolSpan(cm.b)}</div>`;
  html += `<div class="row"><span class="key">A</span>${boolSpan(cm.a)}</div>`;
  html += `</div>`;

  if (d.color_surface) {
    const cs = d.color_surface;
    html += `<div class="state-card"><h3>Color Surface</h3>`;
    html += `<div class="row"><span class="key">Format</span><span class="val">${cs.format}</span></div>`;
    html += `<div class="row"><span class="key">Size</span><span class="val">${cs.width}x${cs.height}</span></div>`;
    html += `<div class="row"><span class="key">Pitch</span><span class="val">${cs.pitch}</span></div>`;
    html += `<div class="row"><span class="key">BPP</span><span class="val">${cs.bpp}</span></div>`;
    html += `</div>`;
  }

  if (d.zeta_surface) {
    const zs = d.zeta_surface;
    html += `<div class="state-card"><h3>Zeta Surface</h3>`;
    html += `<div class="row"><span class="key">Format</span><span class="val">${zs.format}</span></div>`;
    html += `<div class="row"><span class="key">Size</span><span class="val">${zs.width}x${zs.height}</span></div>`;
    html += `<div class="row"><span class="key">Pitch</span><span class="val">${zs.pitch}</span></div>`;
    html += `<div class="row"><span class="key">BPP</span><span class="val">${zs.bpp}</span></div>`;
    html += `</div>`;
  }

  if (d.textures) {
    html += `<div class="state-card"><h3>Textures</h3>`;
    d.textures.forEach(t => {
      const en = t.enabled ? 'on' : 'off';
      html += `<div class="row"><span class="key">Stage ${t.stage}</span>`;
      html += `<span class="val ${en}">${t.enabled ? `fmt:${t.color_format} ${t.width}x${t.height} dim:${t.dim}` : 'OFF'}</span></div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;

  // Shaders
  if (d.shader_hash && session.shaders && session.shaders[d.shader_hash]) {
    const sh = session.shaders[d.shader_hash];
    if (sh.vertex) {
      html += `<div class="shader-section"><h3 onclick="toggleShader(this)">&#9654; Vertex Shader (click to toggle)</h3>`;
      html += `<div class="shader-source" style="display:none">${escapeHtml(sh.vertex)}</div></div>`;
    }
    if (sh.fragment) {
      html += `<div class="shader-section"><h3 onclick="toggleShader(this)">&#9654; Fragment Shader (click to toggle)</h3>`;
      html += `<div class="shader-source" style="display:none">${escapeHtml(sh.fragment)}</div></div>`;
    }
    if (sh.geometry) {
      html += `<div class="shader-section"><h3 onclick="toggleShader(this)">&#9654; Geometry Shader (click to toggle)</h3>`;
      html += `<div class="shader-source" style="display:none">${escapeHtml(sh.geometry)}</div></div>`;
    }
  }

  el.innerHTML = html;
}

function toggleShader(h3) {
  const src = h3.nextElementSibling;
  const open = src.style.display !== 'none';
  src.style.display = open ? 'none' : '';
  h3.innerHTML = (open ? '&#9654; ' : '&#9660; ') + h3.textContent.replace(/^[^ ]+ /, '');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// PPM parsing
function parsePpmFile(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const buf = new Uint8Array(ev.target.result);
    try {
      let pos = 0;
      const readLine = () => {
        let line = '';
        while (pos < buf.length) {
          const ch = String.fromCharCode(buf[pos++]);
          if (ch === '\n') break;
          line += ch;
        }
        return line.trim();
      };
      let magic = readLine();
      if (magic !== 'P6') { console.warn('Not P6 PPM:', file.name); return; }
      let line;
      do { line = readLine(); } while (line.startsWith('#'));
      const [w, h] = line.split(/\s+/).map(Number);
      const maxVal = parseInt(readLine());
      if (maxVal !== 255) { console.warn('Unsupported maxVal:', maxVal); return; }

      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(w, h);
      for (let i = 0; i < w * h && pos + 2 < buf.length; i++) {
        imgData.data[i*4]   = buf[pos++];
        imgData.data[i*4+1] = buf[pos++];
        imgData.data[i*4+2] = buf[pos++];
        imgData.data[i*4+3] = 255;
      }
      ctx.putImageData(imgData, 0, 0);
      ppmImages[file.name] = canvas.toDataURL();
      delete ppmLoading[file.name];
      console.log('Loaded PPM:', file.name, w, 'x', h);
      // Re-render detail when PPM loads
      if (session) {
        if (selectedDraw >= 0) renderDetail();
        else renderFrameDetail();
      }
    } catch (err) { console.error('PPM parse error:', file.name, err); }
  };
  reader.readAsArrayBuffer(file);
}

// Copy for Claude
function formatDrawForClaude(frameIdx, drawIdx) {
  const frame = session.frames[frameIdx];
  const d = frame.draw_calls[drawIdx];
  if (!d) return '';

  let out = `## Diagnostic Dump \u2014 Frame ${frameIdx} (#${frame.frame_number}), Draw #${d.draw_index}\n\n`;
  out += `### Draw Call State\n\`\`\`json\n${JSON.stringify(d, null, 2)}\n\`\`\`\n\n`;

  if (d.shader_hash && session.shaders && session.shaders[d.shader_hash]) {
    const sh = session.shaders[d.shader_hash];
    if (sh.vertex) out += `### Vertex Shader (${d.shader_hash})\n\`\`\`glsl\n${sh.vertex}\n\`\`\`\n\n`;
    if (sh.fragment) out += `### Fragment Shader (${d.shader_hash})\n\`\`\`glsl\n${sh.fragment}\n\`\`\`\n\n`;
    if (sh.geometry) out += `### Geometry Shader (${d.shader_hash})\n\`\`\`glsl\n${sh.geometry}\n\`\`\`\n\n`;
  }

  if (session.frame_diffs) {
    for (const diff of session.frame_diffs) {
      if (diff.to_frame === frameIdx && diff.draws_with_state_changes.includes(d.draw_index)) {
        out += `### Frame Diff (Frame ${diff.from_frame} \u2192 ${diff.to_frame})\n`;
        out += `${diff.changed_draw_count} total draw(s) changed. Changed draws: [${diff.draws_with_state_changes.join(', ')}]\n\n`;
        const prevFrame = session.frames[diff.from_frame];
        if (prevFrame) {
          const prevDraw = prevFrame.draw_calls.find(pd => pd.draw_index === d.draw_index);
          if (prevDraw) {
            out += `### Previous Frame Draw State (Frame ${diff.from_frame}, Draw #${d.draw_index})\n`;
            out += `\`\`\`json\n${JSON.stringify(prevDraw, null, 2)}\n\`\`\`\n\n`;
          }
        }
        break;
      }
    }
  }
  return out;
}

function copyForClaude() {
  if (!session || selectedDraw < 0) { alert('Select a draw call first'); return; }
  const text = formatDrawForClaude(selectedFrame, selectedDraw);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy for Claude'; }, 1500);
  });
}

function copyAllDiffs() {
  if (!session || !session.frame_diffs || session.frame_diffs.length === 0) { alert('No diffs'); return; }
  let out = `# xemu Diagnostic \u2014 Multi-Frame Diff Report\n\n`;
  out += `**Session:** ${session.capture_info.frame_count} frames from #${session.capture_info.start_frame} | ${session.capture_info.timestamp}\n\n`;
  for (const diff of session.frame_diffs) {
    out += `---\n## Frame ${diff.from_frame} \u2192 ${diff.to_frame}: ${diff.summary}\n\n`;
    for (const di of diff.draws_with_state_changes) {
      const drawIdx = session.frames[diff.to_frame].draw_calls.findIndex(d => d.draw_index === di);
      if (drawIdx >= 0) out += formatDrawForClaude(diff.to_frame, drawIdx);
    }
  }
  navigator.clipboard.writeText(out).then(() => {
    const btn = document.getElementById('btn-copy-diffs');
    btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy All Diffs'; }, 1500);
  });
}

// Drag and drop
document.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('visible'); });
document.addEventListener('dragleave', (e) => { if (!e.relatedTarget) document.getElementById('drop-overlay').classList.remove('visible'); });
document.addEventListener('drop', (e) => {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('visible');
  for (const file of e.dataTransfer.files) {
    if (file.name.endsWith('.json')) {
      const reader = new FileReader();
      reader.onload = (ev) => { try { session = JSON.parse(ev.target.result); onSessionLoaded(); } catch (err) { alert('Parse error: ' + err.message); } };
      reader.readAsText(file);
    } else if (file.name.endsWith('.ppm')) {
      ppmFiles[file.name] = file;
    }
  }
});
